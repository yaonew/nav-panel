version: '3.8'

services:
  nav-panel:
    build:
      context: .
      dockerfile: Dockerfile.single
    image: nav-panel:latest
    container_name: nav-panel
    ports:
      - "3000:3000"
      - "3001:3001"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    volumes:
      - nav-data:/app/server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/categories"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  nav-data:
    driver: local
