version: '3.8'

services:
  # 前端服务
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nav-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - nav-network
    restart: unless-stopped

  # 后端服务
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: nav-backend
    ports:
      - "3001:3001"
    volumes:
      - nav-data:/app/data
    networks:
      - nav-network
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - JWT_SECRET=your-production-secret-key-change-this

# 数据卷
volumes:
  nav-data:
    driver: local

# 网络
networks:
  nav-network:
    driver: bridge
